<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0b14"/>
      <stop offset="100%" stop-color="#0b0b14"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="40%" stop-color="#a78bfa"/>
      <stop offset="70%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="orb1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="orb2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Grid dots -->
  <g opacity="0.04">
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="white"/>
    </pattern>
    <rect width="400" height="400" fill="url(#grid)"/>
  </g>

  <!-- Glowing orbs -->
  <circle cx="80" cy="80" r="140" fill="url(#orb1)"/>
  <circle cx="320" cy="320" r="120" fill="url(#orb2)"/>

  <!-- Waveform bars -->
  <g transform="translate(56, 80)">
    <rect x="0" y="40" width="12" height="60" rx="6" fill="url(#wave)" opacity="0.7"/>
    <rect x="20" y="20" width="12" height="100" rx="6" fill="url(#wave)" opacity="0.85"/>
    <rect x="40" y="32" width="12" height="76" rx="6" fill="url(#wave)" opacity="0.9"/>
    <rect x="60" y="8" width="12" height="124" rx="6" fill="url(#wave)"/>
    <rect x="80" y="26" width="12" height="88" rx="6" fill="url(#wave)" opacity="0.95"/>
    <rect x="100" y="42" width="12" height="56" rx="6" fill="url(#wave)" opacity="0.75"/>
    <rect x="120" y="16" width="12" height="108" rx="6" fill="url(#wave)" opacity="0.88"/>
    <rect x="140" y="36" width="12" height="68" rx="6" fill="url(#wave)" opacity="0.78"/>
    <rect x="160" y="14" width="12" height="112" rx="6" fill="url(#wave)" opacity="0.82"/>
    <rect x="180" y="30" width="12" height="80" rx="6" fill="url(#wave)" opacity="0.86"/>
    <rect x="200" y="10" width="12" height="120" rx="6" fill="url(#wave)" opacity="0.92"/>
    <rect x="220" y="22" width="12" height="96" rx="6" fill="url(#wave)" opacity="0.8"/>
    <rect x="240" y="38" width="12" height="64" rx="6" fill="url(#wave)" opacity="0.72"/>
  </g>

  <!-- Subtle wave line behind text -->
  <path d="M40 280 Q100 260 160 280 Q220 300 280 280 Q340 260 380 280" fill="none" stroke="url(#wave)" stroke-width="1.5" opacity="0.12"/>

  <!-- WAWE text -->
  <g filter="url(#glow)">
    <text x="200" y="348" font-family="'SF Pro Display','Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif" font-size="88" font-weight="800" fill="url(#text)" text-anchor="middle" letter-spacing="6">WAWE</text>
  </g>

  <!-- Music note accents -->
  <text x="310" y="90" font-family="Arial" font-size="36" fill="white" opacity="0.08">♫</text>
  <text x="50" y="360" font-family="Arial" font-size="28" fill="white" opacity="0.06">♪</text>
</svg>
